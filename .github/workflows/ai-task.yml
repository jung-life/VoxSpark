name: AI Task

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      task:
        description: 'Task description for the AI to execute'
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  ai-task:
    runs-on: ubuntu-latest
    # Run on issues labeled 'ai-task', comments starting with '/ai ', or manual dispatch
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'ai-task')) ||
      (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/ai ')) ||
      github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Extract task
        id: extract
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "task=${{ github.event.inputs.task }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "issue_comment" ]; then
            TASK="${{ github.event.comment.body }}"
            TASK="${TASK#/ai }"
            echo "task=$TASK" >> "$GITHUB_OUTPUT"
          else
            echo "task=${{ github.event.issue.body }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run LLM executor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TASK: ${{ steps.extract.outputs.task }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.comment.issue_url }}
        run: node scripts/ai-task-runner.js

      - name: Post result as comment
        if: github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = fs.existsSync('ai-task-result.md')
              ? fs.readFileSync('ai-task-result.md', 'utf8')
              : '_No result file produced._';
            const issueNumber =
              context.issue?.number ||
              parseInt(context.payload.comment?.issue_url?.split('/').pop());
            if (issueNumber) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `### VoxSpark AI Result\n\n${result}`,
              });
            }
